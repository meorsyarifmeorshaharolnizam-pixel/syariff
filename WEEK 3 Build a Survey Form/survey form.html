<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Survey Form</title>
  </head>

  <body>

    <!-- Title -->
    <h1 id="title">Student Experience Survey</h1>

    <!-- Description -->
    <p id="description">
      Please fill out this quick survey to help us improve student life and campus activities.
    </p>

    <!-- Form -->
    <form id="survey-form">

      <!-- Name -->
      <label id="name-label" for="name">Full Name</label><br>
      <input 
        type="text" 
        id="name" 
        name="name" 
        placeholder="Enter your full name" 
        required
      ><br><br>

      <!-- Email -->
      <label id="email-label" for="email">Email Address</label><br>
      <input 
        type="email" 
        id="email" 
        name="email" 
        placeholder="Enter your email" 
        required
      ><br><br>

      <!-- Number -->
      <label id="number-label" for="number">Age</label><br>
      <input 
        type="number" 
        id="number" 
        name="age" 
        placeholder="Enter your age" 
        min="16" 
        max="60"
      ><br><br>

      <!-- Dropdown -->
      <label for="dropdown">Current Status</label><br>
      <select id="dropdown" name="status">
        <option value="">Select an option</option>
        <option value="student">Student</option>
        <option value="graduate">Graduate</option>
      </select><br><br>

      <!-- Radio Buttons -->
      <p>How satisfied are you with campus facilities?</p>
      <label>
        <input type="radio" name="satisfaction" value="satisfied"> Satisfied
      </label><br>
      <label>
        <input type="radio" name="satisfaction" value="neutral"> Neutral
      </label><br><br>

      <!-- Checkboxes -->
      <p>Which activities do you participate in?</p>
      <label>
        <input type="checkbox" value="sports"> Sports
      </label><br>
      <label>
        <input type="checkbox" value="clubs"> Clubs
      </label><br>
      <label>
        <input type="checkbox" value="events"> Events
      </label><br><br>

      <!-- Textarea -->
      <label for="comments">Additional Comments</label><br>
      <textarea id="comments" name="comments" placeholder="Write your feedback here..."></textarea><br><br>

      <!-- Submit Button -->
      <button id="submit" type="submit">Submit Survey</button>

    </form>

  </body>
</html>
