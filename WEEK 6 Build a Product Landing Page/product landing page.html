<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Landing Page</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header id="header">
    <img id="header-img" src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Logo_TV_2015.svg" alt="Company Logo">
    <nav id="nav-bar">
      <a class="nav-link" href="#features">Features</a>
      <a class="nav-link" href="#video-section">Demo</a>
      <a class="nav-link" href="#contact">Contact</a>
    </nav>
  </header>

  <main>
    <section id="features">
      <h2>Features</h2>
    </section>

    <section id="video-section">
      <video id="video" src="https://www.w3schools.com/html/mov_bbb.mp4" controls></video>
    </section>

    <section id="contact">
      <form id="form" action="https://www.freecodecamp.org/email-submit">
        <input id="email" name="email" type="email" placeholder="Enter your email" required>
        <input id="submit" type="submit" value="Submit">
      </form>
    </section>
  </main>

</body>
</html>
